# 本番向けスタック（例: VPS・単一ホスト）
#
# - DB: 永続ボリューム pgdata
# - アップロード・DATA_DIR: 永続ボリューム knowledge_data → コンテナ内 /app/data（uploads/ 含む）
# - バックエンド: ソースバインドなし（イメージ内の app のみ）。コード変更後は再ビルドが必要。
# - フロント: `frontend/Dockerfile.prod` で next build / next start（開発用 CMD ではない）
#
# 起動例（リポジトリルートで）:
#   export NEXT_PUBLIC_API_URL=http://localhost:8001   # ブラウザが API に辿り着く URL（必ず実環境に合わせる）
#   docker compose -f docker-compose.prod.yml up -d --build
#
# backend/.env に GOOGLE_API_KEY・本番用 DB パスワード・AUTH_* 等を用意する。
# 詳細は docs/PRODUCTION.md を参照。

services:
  db:
    image: ankane/pgvector:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge
      POSTGRES_DB: knowledge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge -d knowledge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://knowledge:knowledge@db:5432/knowledge
      DATA_DIR: /app/data
      ENVIRONMENT: production
    volumes:
      - knowledge_data:/app/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
        NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-false}
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  knowledge_data:
