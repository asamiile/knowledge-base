services:
  db:
    image: ankane/pgvector:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge
      POSTGRES_DB: knowledge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge -d knowledge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://knowledge:knowledge@db:5432/knowledge
      DATA_DIR: /app/data
      # GOOGLE_API_KEY は backend/.env に書く（ホストの ${GOOGLE_API_KEY:-} で上書きすると空になりキーが消えるためここでは渡さない）
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command:
      - sh
      - -c
      - |
        set -e
        STAMP=/app/node_modules/.install-stamp
        if [ ! -f "$$STAMP" ] || [ package-lock.json -nt "$$STAMP" ]; then
          npm ci
          touch "$$STAMP"
        fi
        exec npm run dev
    depends_on:
      - backend

  # Drizzle Studio
  drizzle-studio:
    profiles:
      - drizzle
    image: node:22-bookworm-slim
    working_dir: /app
    environment:
      DATABASE_URL_STUDIO: postgresql://knowledge:knowledge@db:5432/knowledge
    volumes:
      - ./backend:/app
    ports:
      - "4983:4983"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "corepack enable && corepack prepare pnpm@9.15.9 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm exec drizzle-kit studio --port 4983 --host 0.0.0.0"

volumes:
  pgdata:
  frontend_node_modules:
  frontend_next:
