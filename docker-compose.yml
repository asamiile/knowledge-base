services:
  db:
    image: ankane/pgvector:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge
      POSTGRES_DB: knowledge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge -d knowledge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    environment:
      DATABASE_URL: postgresql://knowledge:knowledge@db:5432/knowledge
      DATA_DIR: /app/data
      # GOOGLE_API_KEY は backend/.env に書く（ホストの ${GOOGLE_API_KEY:-} で上書きすると空になりキーが消えるためここでは渡さない）
    volumes:
      - ./backend:/app
      # 開発: アップロードはホストの backend/data（.gitignore）。本番は docker-compose.prod.yml の命名ボリュームを参照。
      - ./backend/data:/app/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
      - frontend_next:/workspace/frontend/.next
    command:
      - sh
      - -c
      - |
        set -e
        corepack enable && corepack prepare pnpm@9.15.9 --activate
        cd /workspace
        STAMP=/workspace/frontend/node_modules/.install-stamp
        if [ ! -f "$$STAMP" ] || [ pnpm-lock.yaml -nt "$$STAMP" ]; then
          pnpm install --frozen-lockfile
          touch "$$STAMP"
        fi
        cd /workspace/frontend
        exec pnpm run dev
    depends_on:
      - backend

  # Drizzle Studio
  drizzle-studio:
    profiles:
      - drizzle
    image: node:22-bookworm-slim
    working_dir: /workspace
    environment:
      DATABASE_URL_STUDIO: postgresql://knowledge:knowledge@db:5432/knowledge
      CI: "true"
    volumes:
      - .:/workspace
      - drizzle_studio_node_modules:/workspace/node_modules
      - drizzle_studio_frontend_node_modules:/workspace/frontend/node_modules
      - drizzle_studio_backend_node_modules:/workspace/backend/node_modules
    ports:
      - "4983:4983"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "corepack enable && corepack prepare pnpm@9.15.9 --activate &&
      cd /workspace && pnpm install --frozen-lockfile &&
      pnpm --filter knowledge-base-backend-drizzle exec drizzle-kit studio --port 4983 --host 0.0.0.0"

volumes:
  pgdata:
  frontend_node_modules:
  frontend_next:
  drizzle_studio_node_modules:
  drizzle_studio_frontend_node_modules:
  drizzle_studio_backend_node_modules:
